<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <!-- ⭐ FAVICON - Shows in browser tab -->
  <link rel="icon" href="favicon.png" />
  <!-- Or use PNG version -->
  <link rel="icon" type="image/png" href="favicon.png" />
  
  <!-- TITLE -->
  <title>NiteSea - Free Online Image Resizer Tool</title>
  
  <!-- DESCRIPTION -->
  <meta name="description" content="Resize your images instantly with NiteSea's free online image resizer. Fast, secure, and privacy-focused. No uploads required." />
  
  <!-- KEYWORDS -->
  <meta name="keywords" content="image resizer, resize images, free image tool, online image resizer, NiteSea" />  
  <!-- ROBOTS -->
  <meta name="robots" content="index, follow" />
  <meta name="googlebot" content="index, follow" />
  
  <!-- CANONICAL URL -->
  <link rel="canonical" href="https://nitesea.com/" />

  <!-- OPEN GRAPH -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://nitesea.com/" />
  <meta property="og:title" content="NiteSea - Free Online Image Resizer" />
  <meta property="og:description" content="Resize your images instantly with our free online tool. Fast, secure, and privacy-focused." />
  <meta property="og:image" content="https://nitesea.com/logo512.png" />
  <meta property="og:site_name" content="NiteSea" />
  <meta property="og:locale" content="en_US" />

  <!-- TWITTER CARD -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://nitesea.com/" />
  <meta name="twitter:title" content="NiteSea - Free Online Image Resizer" />
  <meta name="twitter:description" content="Resize your images instantly with our free online tool. Fast, secure, and privacy-focused." />
  <meta name="twitter:site" content="@nitesea" />

  <!-- STRUCTURED DATA -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "NiteSea",
      "url": "https://nitesea.com",
      "logo": "https://nitesea.com/logo512.png",
      "description": "Free online image resizer tool. Resize images instantly without uploading to servers."
    }
  </script>

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "NiteSea Image Resizer",
      "url": "https://nitesea.com",
      "description": "Free online image resizer tool. Resize images instantly without uploading to servers.",
      "applicationCategory": "Multimedia",
      "operatingSystem": "All",
      "browserRequirements": "Requires JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
  </script>

  <!-- React from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    /* Reset & base */
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #f5f7fa; 
      min-height: 100vh;
    }
    
    #root { 
      min-height: 100vh; 
    }
    
    input[type="file"] { 
      display: block; 
      margin: 0 auto; 
      padding: 0.5rem; 
      background: white; 
      border-radius: 30px; 
      border: 1px solid #ddd; 
      cursor: pointer; 
      width: 100%;
      max-width: 300px;
    }
    
    img { 
      max-width: 100%; 
      height: auto; 
    }
    
    input[type="range"] { 
      accent-color: #00d9ff; 
    }
    
    button { 
      transition: all 0.2s ease; 
      cursor: pointer; 
      touch-action: manipulation;
    }
    
    button:hover { 
      transform: scale(1.02); 
      opacity: 0.9; 
    }
    
    button:disabled { 
      opacity: 0.5; 
      transform: none; 
      cursor: not-allowed; 
    }
    
    @media (max-width: 600px) {
      .nav-links { 
        gap: 0.3rem !important; 
      }
      .nav-link { 
        padding: 0.3rem 0.6rem !important; 
        font-size: 0.85rem !important; 
      }
      .upload-area { 
        padding: 1.5rem 1rem !important; 
      }
      .controls { 
        gap: 0.5rem !important; 
      }
      .input-group { 
        padding: 0.3rem 0.6rem !important; 
        flex-wrap: wrap; 
        font-size: 0.9rem; 
      }
      .input-group input[type="number"] { 
        width: 60px !important; 
      }
      .container-padding {
        padding: 1rem !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
</body>
</html>
